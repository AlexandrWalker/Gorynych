<div id="authCode" class="auth popup" data-lenis-prevent>

      <div class="popup__close">

      </div>
    </div>
    <div class="popup__inner">

      <div class="layout" data-popup-scroll>
        <div class="container">
          <div class="layout__inner">

            <div class="layout__head">
              <div class="layout__head-title">
                <h2>
                  Введите <br> код авторизации

            </div>

            <div class="layout__body">

              <form action="#" class="layout__form form-code-body">

                <div class="form-group">
                  <div class="form-code-wrap">
                    <input class="form-code" type="text" name="auth_code_1" maxlength="1" inputmode="numeric"
                      placeholder="-">
                    <input class="form-code" type="text" name="auth_code_2" maxlength="1" inputmode="numeric"
                      placeholder="-">
                    <input class="form-code" type="text" name="auth_code_3" maxlength="1" inputmode="numeric"
                      placeholder="-">
                    <input class="form-code" type="text" name="auth_code_4" maxlength="1" inputmode="numeric"
                      placeholder="-">
                    <input class="form-code" type="text" name="auth_code_5" maxlength="1" inputmode="numeric"
                      placeholder="-">

                </div>

                <div class="form-foot">
                  <button class="btn btn--green" disabled>
                    Войти
                  </button>
                  <div class="form-group form-text">
                    <input id="form-checkbox-7" class="form-checkbox" type="checkbox" required="">
                    <label for="form-checkbox-7">
                      <div class="form-checkbox--item"></div>
                      <p>
                        Я согласен на <a href="javascript:void(0)" data-popup-target="policy">обработку персональных данных</a>
                      </p>

                  </div>
                  <div class="form-group form-text">
                    <input id="form-checkbox-8" class="form-checkbox" type="checkbox">
                    <label for="form-checkbox-8">
                      <div class="form-checkbox--item"></div>
                      <p>
                        Я согласен на <a href="javascript:void(0)">рекламные уведомления</a>
                      </p>
                    </label>
                  </div>
                  <div class="form-text">
                    <p>
                      Нажимая на кнопку, Вы соглашаетесь с обработкой персональных данный в рамках <a
                        href="javascript:void(0)" data-popup-target="policy">Политики персональных данных </a>
                    </p>
                  </div>
                </div>
              </form>

            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
