<div id="auth" class="auth popup" data-lenis-prevent>
  <div class="popup__wrap">
        <div class="popup__area" data-popup-head>
      <div class="popup__close">
        <i class="icon-close"></i>
      </div>
    </div>
    <div class="popup__inner">

      <div class="layout" data-popup-scroll>
        <div class="container">
          <div class="layout__inner">

            <div class="layout__head">
              <div class="layout__head-title">
                <h2>
                  Авторизация
                </h2>
              </div>
            </div>

            <div class="layout__body">

              <form action="#" class="layout__form">

                <div class="form-group">
                  <label class="form-label">
                    Телефон*
                    <input class="form-input" type="tel" name="auth_tel" placeholder="Телефон">
                  </label>
                </div>

                <div class="form-foot">
                  <button class="btn btn--green" type="button" data-popup-target="authCode">
                    Получить код
                  </button>
                  <div class="form-group form-text">
                    <input id="form-checkbox-5" class="form-checkbox" type="checkbox" required="">
                    <label for="form-checkbox-5">
                      <div class="form-checkbox--item"></div>
                      <p>
                        Я согласен на <a href="javascript:void(0)" data-popup-target="policy">обработку персональных данных</a>
                      </p>
                    </label>
                  </div>
                  <div class="form-group form-text">
                    <input id="form-checkbox-6" class="form-checkbox" type="checkbox">
                    <label for="form-checkbox-6">
                      <div class="form-checkbox--item"></div>
                      <p>
                        Я согласен на <a href="javascript:void(0)">рекламные уведомления</a>
                      </p>
                    </label>
                  </div>
                  <div class="form-text">
                    <p>
                      Нажимая на кнопку, Вы соглашаетесь с обработкой персональных данный в рамках <a
                        href="javascript:void(0)" data-popup-target="policy">Политики персональных данных </a>
                    </p>
                  </div>
                </div>
              </form>

            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
