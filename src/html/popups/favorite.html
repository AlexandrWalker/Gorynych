<div id="favorite" class="favorite popup" data-lenis-prevent>
  <div class="popup__wrap">
        <div class="popup__area" data-popup-head>
      <div class="popup__close">
        <i class="icon-close"></i>
      </div>
    </div>
    <div class="popup__inner">

      <div class="layout" data-popup-scroll>
        <div class="container">
          <div class="layout__inner">

            <div class="layout__head">
              <div class="layout__head-title">
                <h2>
                  Нравится
                </h2>
              </div>
            </div>
            <div class="layout__body">
              <div class="layout__block">

                <div class="layout">
                  <div class="layout__inner">
                    <div class="layout__head">
                      <div class="layout__nav">
                        <button class="layout__nav-item active" type="button" data-nav="favorites-hot">
                          Горячее
                        </button>
                        <button class="layout__nav-item" type="button" data-nav="favorites-pasta">
                          Паста
                        </button>
                        <button class="layout__nav-item" type="button" data-nav="favorites-sides">
                          Гарниры
                        </button>
                        <button class="layout__nav-item" type="button" data-nav="favorites-soups">
                          Супы
                        </button>
                      </div>
                    </div>
                    <div class="layout__items">
                      @@loop('./../elements/card-item-osnovnoe.html', './data/card-items-osnovnoe-favorites.json')
                    </div>
                  </div>
                </div>

                <!-- <div class="layout layout--carousel">
                  <div class="layout__inner">
                    <div class="layout__head">
                      <div class="layout__title">
                        <h2>
                          Вам понравится
                        </h2>
                      </div>
                    </div>
                    <div class="layout__items">
                      @@loop('./../elements/card-item.html', './data/card-items.json')
                    </div>
                  </div>
                </div> -->

              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
