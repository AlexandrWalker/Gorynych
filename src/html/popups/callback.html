<div id="callback" class="callback popup" data-lenis-prevent>
  <div class="popup__wrap">
    <div class="popup__area" data-popup-head>
      <div class="popup__close">
        <i class="icon-close"></i>
      </div>
    </div>
    <div class="popup__inner">

      <div class="layout" data-popup-scroll>
        <div class="container">
          <div class="layout__inner">

            <div class="layout__head">
              <div class="layout__head-title">
                <h2>
                  Обратная связь
                </h2>
              </div>
            </div>

            <div class="layout__body">

              <form action="#" class="layout__form">
                <div class="form-wrap">
                  <div class="form-group">
                    <label class="filter__item">
                      <input type="radio" name="sub1">
                      <span class="filter__check"></span>
                      <div class="filter__item-text">
                        Сообщить о проблеме
                      </div>
                      <i class="icon-chevron"></i>
                    </label>
                  </div>
                  <div class="form-group">
                    <label class="filter__item">
                      <input type="radio" name="sub1">
                      <span class="filter__check"></span>
                      <div class="filter__item-text">
                        Идея для улучшения
                      </div>
                      <i class="icon-chevron"></i>
                    </label>
                  </div>
                </div>
                <div class="form-body">
                  <div class="form-group">
                    <label class="form-label">
                      <input class="form-input" type="text" name="reg_name" placeholder="Имя" required>
                    </label>
                  </div>
                  <div class="form-group">
                    <label class="form-label">
                      <input class="form-input" type="tel" name="reg_tel" placeholder="Телефон" required>
                    </label>
                  </div>
                  <div class="form-group">
                    <label class="form-label">
                      <input class="form-input" type="email" name="reg_tel" placeholder="Эл. почта" required>
                    </label>
                  </div>
                  <div class="form-group">
                    <label class="form-label">
                      <textarea class="form-textarea" name="comment" rows="7" placeholder="Сообщение"></textarea>
                    </label>
                  </div>
                </div>
                <div class="form-foot">
                  <button class="btn btn--accent" type="button" data-popup-target="callbackSuccess">
                    Отправить
                  </button>
                  <div class="form-group form-text">
                    <input id="form-checkbox-9" class="form-checkbox" type="checkbox" required="">
                    <label for="form-checkbox-9">
                      <div class="form-checkbox--item"></div>
                      <p>
                        Я согласен на <a href="javascript:void(0)" data-popup-target="policy">обработку персональных
                          данных</a>
                      </p>
                    </label>
                  </div>
                  <div class="form-group form-text">
                    <input id="form-checkbox-10" class="form-checkbox" type="checkbox">
                    <label for="form-checkbox-10">
                      <div class="form-checkbox--item"></div>
                      <p>
                        Я согласен на <a href="javascript:void(0)">рекламные уведомления</a>
                      </p>
                    </label>
                  </div>
                  <div class="form-text">
                    <p>
                      Нажимая на кнопку, Вы соглашаетесь с обработкой персональных данный в рамках <a
                        href="javascript:void(0)" data-popup-target="policy">Политики персональных данных </a>
                    </p>
                  </div>
                </div>
              </form>

            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
