<div class="panel">
  <div class="panel__inner">
    <div class="panel__btns">
      <button class="panel__btn" data-popup-target="filter" data-popup-toggle>
        <div class="panel__btn-icon">
          <i class="icon-filter"></i>
        </div>
        <span>
          Фильтр
        </span>
      </button>
      <button class="panel__btn" data-popup-target="favorite" data-popup-toggle>
        <div class="panel__btn-icon">
          <i class="icon-like"></i>
        </div>
        <span>
          Нравится
        </span>
      </button>
      <button class="panel__btn panel__btn--mid" data-popup-target="call" data-popup-toggle>
        <div class="panel__btn-icon">
          <i class="icon-call"></i>
        </div>
        <span>
          Вызов официанта
        </span>
      </button>
      <button class="panel__btn" data-popup-target="profile" data-popup-toggle>
        <div class="panel__btn-icon">
          <i class="icon-login"></i>
        </div>
        <span>
          Войти
        </span>
      </button>
      <button class="panel__btn" data-popup-target="menu" data-popup-toggle>
        <div class="panel__btn-icon">
          <i class="icon-meatballs"></i>
        </div>
        <span>
          Ещё
        </span>
      </button>
    </div>
  </div>

  <div class="scrollup">
    <div class="scrollup__btn">
      <a class="scrollup__btn scrollup__btn--visible" href="#main">
        <i class="icon-up"></i>
      </a>
      <!-- <div class="scrollup__btn scrollup__btn--hidden" data-close-all-popups>
        <i class="icon-home"></i>
      </div> -->
    </div>
  </div>
</div>
