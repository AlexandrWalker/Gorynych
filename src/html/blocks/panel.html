<div class="panel">
  <div class="panel__inner">
    <div class="panel__btns">
      <div class="panel__btn">
        <a class="panel__btn panel__btn--visible" href="#main">
          <i class="icon-up"></i>
          <span>
            Наверх
          </span>
        </a>
        <div class="panel__btn panel__btn--hidden" data-close-all-popups>
          <i class="icon-home"></i>
          <span>
            На главную
          </span>
        </div>
      </div>
      <button class="panel__btn" data-popup-target="filter" data-popup-toggle>
        <i class="icon-filter"></i>
        <span>
          Фильтр
        </span>
      </button>
      <button class="panel__btn panel__btn--mid" data-popup-target="favorite" data-popup-toggle>
        <i class="icon-like"></i>
        <span>
          Нравится
        </span>
      </button>
      <button class="panel__btn" data-popup-target="profile" data-popup-toggle>
        <i class="icon-login"></i>
        <span>
          Войти
        </span>
      </button>
      <button class="panel__btn" data-popup-target="menu" data-popup-toggle>
        <i class="icon-meatballs"></i>
        <span>
          Ещё
        </span>
      </button>
    </div>
    <div class="panel__mask">
      <svg id="waveSvg" viewBox="0 0 402 77" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path id="wavePath" fill="#FDF6EC" />
      </svg>
    </div>
  </div>
</div>
