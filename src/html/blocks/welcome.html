<div id="welcome" class="welcome">
  <div class="container">
    <div class="welcome__inner">

      <div class="welcome__content">
        <div class="welcome__logo">
          <img src="./../../images/logo/logo-big.svg" alt="Горыныч">
        </div>
        <div class="welcome__text">
          <p>
            Зарегистрируйтесь или войдите в приложение что бы получать бонусы и скидки!
          </p>
        </div>
        <div class="welcome__btns">
          <button class="welcome__btn btn btn--accent layout__btn--login" data-log="login" type="button">
            Войти
          </button>
          <button class="welcome__btn btn btn--gray" type="button" data-popup-target="reg">
            Регистрация
          </button>
        </div>
      </div>

      <div class="welcome__lang">
        <button class="welcome__lang-btn" data-lang="ru" data-popup-target="language">
          <div class="welcome__lang-img">
            <img src="./../../images/temp/language-icon-ru.svg" alt="">
          </div>
          <div class="welcome__lang-text">
            <p>
              Русский
            </p>
            <i class="icon-chevron-right"></i>
          </div>
        </button>
      </div>

    </div>
  </div>
</div>
